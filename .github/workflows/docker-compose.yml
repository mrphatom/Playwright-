version: '3.8'

services:
  bot:
    image: ghcr.io/YOUR_GITHUB_USERNAME/YOUR_REPO_NAME:main
    container_name: tg-scraper-bot
    restart: unless-stopped
    env_file:
      - .env
    # Optional: Limit memory if your VPS is small so it doesn't crash the server
    deploy:
      resources:
        limits:
          memory: 1.5G

